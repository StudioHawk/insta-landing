name: Refresh data and deploy
on:
  schedule:
    # 20:00 UTC = 07:00 Melbourne (AEDT UTC+11). Drifts 1h during AEST.
    - cron: "0 20 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Fetch data
        run: node scripts/fetch-data.mjs
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY:           ${{ secrets.YOUTUBE_API_KEY }}
          STUDIOHAWK_YT_CHANNEL_ID:  ${{ secrets.STUDIOHAWK_YT_CHANNEL_ID }}

      - name: Commit if changed
        run: |
          git config user.name  "insta-bot"
          git config user.email "insta-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy . --project-name=harry-insta --branch=main --commit-dirty=true
